---
environment: production
environmentCode: dev
container:
  azureStorageAccountName: devffcpayst1001
  messageQueueHost: DEVFFCINFSB1001.servicebus.windows.net
  updatesMessageQueueHost: devdaxinfsb1241.servicebus.windows.net
  demographicsStorageAccountName: devrleinfst1403
  demographicsStorageShareName: dem-container

secretProviderClass:
  azure:
    keyvaultName: DEVFFCINFKV1001
    objects:
      - objectName: devtest-ffcahwr-appInsights-connectionString
        objectType: secret
      - objectName: dev-ffcpayDaxServiceBusConnectionString
        objectType: secret
      - objectName: dev-ffc-pay-demographics-storage-connection-string
        objectType: secret
      - objectName: ffc-pay-demographics-client-secret
        objectType: secret

  secretObjects:
    - secretName: ffc-pay-demographics
      type: Opaque
      data:
        - objectName: devtest-ffcahwr-appInsights-connectionString
          key: APPINSIGHTS_CONNECTIONSTRING
        - objectName: dev-ffcpayDaxServiceBusConnectionString
          key: UPDATES_MESSAGE_QUEUE_CONNECTION_STRING
        - objectName: dev-ffc-pay-demographics-storage-connection-string
          key: DEMOGRAPHICS_STORAGE_CONNECTION_STRING
        - objectName: ffc-pay-demographics-client-secret
          key: DEMOGRAPHICS_CLIENT_SECRET