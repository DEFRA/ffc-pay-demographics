---
environment: production
environmentCode: prd
container:
  messageQueueHost: PRDFFCINFSB1001.servicebus.windows.net
  azureStorageAccountName: prdffcpayst1001
  updatesMessageQueueHost: prddaxinfsb1241.servicebus.windows.net
  demographicsStorageAccountName: prdrleinfst1403
  demographicsStorageShareName: dem-container
secretProviderClass:
  azure:
    keyvaultName: PRDFFCINFKV1001
    objects:
      - objectName: prd-ffcahwr-appinsights-connectionString
        objectType: secret
      - objectName: prd-ffcpayDaxServiceBusConnectionString
        objectType: secret
      - objectName: ffc-pay-demographics-client-secret
        objectType: secret

  secretObjects:
    - secretName: ffc-pay-demographics
      type: Opaque
      data:
        - objectName: prd-ffcahwr-appinsights-connectionString
          key: APPINSIGHTS_CONNECTIONSTRING
        - objectName: prd-ffcpayDaxServiceBusConnectionString
          key: UPDATES_MESSAGE_QUEUE_CONNECTION_STRING
        - objectName: ffc-pay-demographics-client-secret
          key: DEMOGRAPHICS_CLIENT_SECRET